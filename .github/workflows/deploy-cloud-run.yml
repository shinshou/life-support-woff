name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-cloud-run.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast1
  SERVICE: life-support-woff-server
  REGISTRY: asia-northeast1-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" ./server
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          flags: --allow-unauthenticated
          env_vars: |
            SPREADSHEET_ID=${{ secrets.SPREADSHEET_ID }}
            LINEWORKS_CLIENT_ID=${{ secrets.LINEWORKS_CLIENT_ID }}
            LINEWORKS_CLIENT_SECRET=${{ secrets.LINEWORKS_CLIENT_SECRET }}
            LINEWORKS_SERVICE_ACCOUNT=${{ secrets.LINEWORKS_SERVICE_ACCOUNT }}
            LINEWORKS_BOT_ID=${{ secrets.LINEWORKS_BOT_ID }}
            LINEWORKS_PRIVATE_KEY=${{ secrets.LINEWORKS_PRIVATE_KEY }}
